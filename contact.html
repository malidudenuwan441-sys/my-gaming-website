<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <style>
        body {
            background-color: #0d0d11;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        nav a {
            color: #ff3333;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #ff3333;
        }

        .form-box {
            max-width: 500px;
            margin: 40px auto;
            background-color: rgba(26, 26, 34, 0.85);
            /* Transparent කළා වැස්ස පේන්න */
            border: 2px solid #ff3333;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(255, 51, 51, 0.2);
            text-align: left;
            /* Form එක ඇතුලේ ලේබල් වමට කරන්න */
        }

        h1 {
            text-align: center;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
        }

        label {
            font-weight: bold;
            color: #ff3333;
            display: block;
            margin-top: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: #0d0d11;
            border: 1px solid #ff3333;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            outline: none;
            box-shadow: 0 0 10px #ff3333;
        }

        button {
            background-color: #ff3333;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
            transition: 0.3s;
            margin-top: 20px;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background-color: #e60000;
            box-shadow: 0 0 20px #ff3333;
        }

        /* 🚀 Heading එකට Drop-In Animation එක */
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
            animation: dropIn 1.5s ease-out;
        }

        @keyframes dropIn {
            0% {
                opacity: 0;
                transform: translateY(-50px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🚀 මැද තියෙන .content-box එකට Slide-In Animation එක */
        .content-box {
            animation: slideIn 1.2s ease-out;
        }

        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateX(-100px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>

    <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="contact.html">Contact</a>
    </nav>

    <hr style="border: 0.5px solid #222; margin: 30px 0;">

    <div class="form-box">
        <h1>Contact Me 📨</h1>

        <form action="https://formspree.io/f/mnjkrrdz" method="POST">

            <label>ඔයාගේ නම:</label>
            <input type="text" name="name" placeholder="John Doe" required>

            <label>Email ලිපිනය:</label>
            <input type="email" name="email" placeholder="abc@gmail.com" required>

            <label>මැසේජ් එක:</label>
            <textarea rows="4" name="message" placeholder="මෙතන ටයිප් කරන්න..." required></textarea>

            <button type="submit">Submit කරන්න</button>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const characters = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const charArray = characters.split("");
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) { drops[x] = 1; }
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff3333";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }
        setInterval(draw, 33);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>

</html>
